# ============================================================
# FREE MONITORING STACK - Docker Compose
# ============================================================
# Prometheus + Grafana + AlertManager (All FREE & Open Source)
#
# Usage:
#   Start: docker-compose -f docker-compose.monitoring.yml up -d
#   Stop:  docker-compose -f docker-compose.monitoring.yml down
#
# Access URLs:
#   - Prometheus: http://localhost:9090
#   - Grafana: http://localhost:3000 (admin/admin)
#   - AlertManager: http://localhost:9093
# ============================================================

version: '3.8'

services:
  # ------------------------------------------------------------
  # Prometheus - Metrics Collection (FREE)
  # ------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: newsapp-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - monitoring-network
    restart: unless-stopped

  # ------------------------------------------------------------
  # Grafana - Dashboards & Visualization (FREE)
  # ------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: newsapp-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123!  # Change this!
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - monitoring-network
    depends_on:
      - prometheus
    restart: unless-stopped

  # ------------------------------------------------------------
  # AlertManager - Alert Management (FREE)
  # ------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:latest
    container_name: newsapp-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/config.yml
    command:
      - '--config.file=/etc/alertmanager/config.yml'
      - '--storage.path=/alertmanager'
    networks:
      - monitoring-network
    restart: unless-stopped

  # ------------------------------------------------------------
  # Node Exporter - System Metrics (FREE)
  # ------------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:latest
    container_name: newsapp-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - monitoring-network
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:

networks:
  monitoring-network:
    driver: bridge