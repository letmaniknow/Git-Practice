# ============================================================
# DOCKER COMPOSE - TheNews Application
# ============================================================
# Development and Production deployment configuration
#
# Usage:
#   Development: docker-compose up -d
#   Production:  docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================

version: '3.8'

services:
  # ------------------------------------------------------------
  # Application Service
  # ------------------------------------------------------------
  news-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: newsapp-app:latest
    container_name: newsapp-app
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      # Profile
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      
      # Database
      DB_URL: ${DB_URL:-jdbc:sqlserver://db:1433;databaseName=news_app;encrypt=false;trustServerCertificate=true}
      DB_USERNAME: ${DB_USERNAME:-sa}
      DB_PASSWORD: ${DB_PASSWORD:-YourStrong@Passw0rd}
      
      # JWT
      JWT_SECRET: ${JWT_SECRET:-DevSecretKeyForLocalTesting2024ThisIsNotSecureForProduction!}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-900000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}
      
      # Email (optional for dev)
      MAIL_HOST: ${MAIL_HOST:-mailhog}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      
      # File paths
      NEWS_MEDIA_PATH: /app/data/media/newsapp/
      ADMIN_AVATAR_PATH: /app/data/media/avatars/
      LOG_PATH: /var/log/newsapp-app
      
    volumes:
      - newsapp-media:/app/data/media
      - newsapp-logs:/var/log/newsapp-app
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - newsapp-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ------------------------------------------------------------
  # Database Service (SQL Server)
  # ------------------------------------------------------------
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: newsapp-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DB_PASSWORD:-YourStrong@Passw0rd}
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - db-data:/var/opt/mssql
    restart: unless-stopped
    networks:
      - newsapp-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -No -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  # ------------------------------------------------------------
  # MailHog (Development email testing)
  # ------------------------------------------------------------
  mailhog:
    image: mailhog/mailhog:latest
    container_name: newsapp-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - newsapp-network
    profiles:
      - dev

# ------------------------------------------------------------
# Networks
# ------------------------------------------------------------
networks:
  news-network:
    driver: bridge

# ------------------------------------------------------------
# Volumes
# ------------------------------------------------------------
volumes:
  db-data:
    driver: local
  news-media:
    driver: local
  news-logs:
    driver: local
