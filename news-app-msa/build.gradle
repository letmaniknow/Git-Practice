plugins {
	id 'java'
	id 'org.springframework.boot' version '3.5.9'
	id 'io.spring.dependency-management' version '1.1.0'
}

group = 'com.mmva'
version = '0.0.1-SNAPSHOT'
description = 'Demo project for Spring Boot'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
	}
}

tasks.withType(JavaCompile) {
	options.compilerArgs.add("--enable-preview")
}

configurations {
	compileOnly {
		extendsFrom annotationProcessor
	}
}

repositories {
	mavenCentral()
}

dependencies {
	// Apache HttpClient 5 BOM for RestClient support
	implementation platform('org.apache.httpcomponents.client5:httpclient5:5.3.1')
	implementation 'org.apache.httpcomponents.client5:httpclient5'
	implementation 'org.apache.httpcomponents.core5:httpcore5:5.2.4'
	implementation 'org.apache.httpcomponents.core5:httpcore5-h2:5.2.4'

	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
	implementation 'org.springframework.boot:spring-boot-starter-web'
	
	// Caching support
	implementation 'org.springframework.boot:spring-boot-starter-cache'
	implementation 'com.github.ben-manes.caffeine:caffeine:3.1.8'
	
	// Email support
	implementation 'org.springframework.boot:spring-boot-starter-mail'
	
	// Rate limiting with Bucket4j
	implementation 'com.bucket4j:bucket4j-core:8.10.1'
	
	// Resilience4j - Circuit Breaker for Elasticsearch (Netflix pattern)
	implementation 'io.github.resilience4j:resilience4j-spring-boot3:2.1.0'
	implementation 'io.github.resilience4j:resilience4j-circuitbreaker:2.1.0'
	
	compileOnly 'org.projectlombok:lombok'
	runtimeOnly 'com.h2database:h2'

	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

	//Annotations like @Data
	annotationProcessor 'org.projectlombok:lombok'
	annotationProcessor 'org.projectlombok:lombok-mapstruct-binding:0.2.0'

	//Mapper @Mapper
	implementation 'org.mapstruct:mapstruct:1.5.5.Final'
	annotationProcessor 'org.mapstruct:mapstruct-processor:1.5.5.Final'

	//Object to JSON Mapper ObjectMapper
	implementation 'com.fasterxml.jackson.core:jackson-databind:2.17.1'

	//Validation like @NotNull @Valid
	implementation 'jakarta.validation:jakarta.validation-api:3.0.2'
	implementation 'org.hibernate.validator:hibernate-validator:8.0.1.Final'

	// PostgreSQL Driver
	implementation 'org.postgresql:postgresql:42.7.1'

	//Swagger/OpenAPI Documentation
	implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.7.0'

	// Spring Boot Actuator
	implementation 'org.springframework.boot:spring-boot-starter-actuator'

	// Micrometer for Prometheus metrics
	implementation 'io.micrometer:micrometer-registry-prometheus:latest.release'

	// ========================================
	// Spring Security + JWT
	// ========================================
	implementation 'org.springframework.boot:spring-boot-starter-security'
	implementation 'io.jsonwebtoken:jjwt-api:0.12.5'
	runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.12.5'
	runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.12.5'

	// ========================================
	// Data Encryption (GDPR Compliance)
	// ========================================
	implementation 'org.springframework.security:spring-security-crypto:6.2.1'

	// ========================================
	// Google OAuth2 Client (ID Token Verification)
	// ========================================
	implementation 'com.google.api-client:google-api-client:2.2.0'

	// ========================================
	// Apple Sign In (JWT Verification)
	// ========================================
	implementation 'com.nimbusds:nimbus-jose-jwt:9.37'

	// ========================================
	// HTML Processing (Jsoup)
	// ========================================
	implementation 'org.jsoup:jsoup:1.17.1'

	// ========================================
	// Video Frame Extraction (Jcodec)
	// ========================================
	implementation 'org.jcodec:jcodec:0.2.5'
	implementation 'org.jcodec:jcodec-javase:0.2.5'

	// ========================================
	// Image Processing (Thumbnailator)
	// ========================================
	implementation 'net.coobird:thumbnailator:0.4.20'

	// ========================================
	// Extended Image Format Support (TwelveMonkeys ImageIO)
	// Adds support for modern formats like AVIF, HEIF, WebP, etc.
	// ========================================
	implementation 'com.twelvemonkeys.imageio:imageio-core:3.10.1'
	implementation 'com.twelvemonkeys.imageio:imageio-jpeg:3.10.1'
	implementation 'com.twelvemonkeys.imageio:imageio-webp:3.10.1'
	// Note: AVIF support requires native libraries. For full AVIF support, consider:
	// 1. Using imageio-batik for basic support
	// 2. Or removing AVIF from supported types if native libs cannot be installed

	// ========================================
	// PDF Generation (Apache PDFBox - Open Source Alternative)
	// ========================================
	implementation 'org.apache.pdfbox:pdfbox:3.0.2'

	// ========================================
	// Excel Generation (Apache POI)
	// ========================================
	implementation 'org.apache.poi:poi:5.2.5'
	implementation 'org.apache.poi:poi-ooxml:5.2.5'  // For .xlsx support

	// ========================================
	// Payment Processing (Stripe)
	// ========================================
	implementation 'com.stripe:stripe-java:24.16.0'

	// ========================================
	// Firebase Admin SDK (Push Notifications)
	// ========================================
	implementation 'com.google.firebase:firebase-admin:9.2.0'

	// ========================================
	// Google AdSense Management API
	// ========================================
	// Using stable Google API client libraries available in Maven Central
	// Note: AdSense API requires manual credential setup
	implementation 'com.google.api-client:google-api-client:1.35.2'
	implementation 'com.google.apis:google-api-services-adsense:v1.4-rev524-1.25.0'
	implementation 'com.google.http-client:google-http-client-jackson2:1.43.3'
	
	// ========================================
	// Elasticsearch for Advanced Search
	// ========================================
	implementation 'org.springframework.data:spring-data-elasticsearch:5.4.0'
	implementation 'co.elastic.clients:elasticsearch-java:8.15.0'
	implementation 'org.elasticsearch.client:elasticsearch-rest-client:8.15.0'
	implementation 'org.apache.httpcomponents.client5:httpclient5:5.3.1'

	// ========================================
	// WebSocket for Real-time Updates
	// ========================================
	implementation 'org.springframework.boot:spring-boot-starter-websocket'

	// OAuth2 Client Support
	implementation 'org.springframework.security:spring-security-oauth2-client'

	// Security test support
	testImplementation 'org.springframework.security:spring-security-test'
}

tasks.named('test') {
	useJUnitPlatform()
}
